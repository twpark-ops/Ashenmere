apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentburg-server
  namespace: agentburg
  labels:
    app.kubernetes.io/name: agentburg-server
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: agentburg
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: agentburg-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentburg-server
        app.kubernetes.io/component: server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: server
          image: ghcr.io/twpark-ops/agentburg-server:latest
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agentburg-secrets
                  key: database-url
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: agentburg-secrets
                  key: jwt-secret-key
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agentburg-secrets
                  key: admin-password
            - name: NATS_URL
              value: nats://nats.agentburg.svc:4222
            - name: REDIS_URL
              value: redis://redis.agentburg.svc:6379/0
            - name: DEBUG
              value: "false"
            - name: CORS_ORIGINS
              value: "https://agentburg.example.com"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: agentburg-server
  namespace: agentburg
  labels:
    app.kubernetes.io/name: agentburg-server
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agentburg-server
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
