name: CD

on:
  # Auto-deploy when CI passes on main
  push:
    branches: [main]
  # Manual deploy trigger with environment selection
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false  # Never cancel in-progress deploys

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/agentburg

permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Run CI checks first (reuse existing CI workflow)
  # ---------------------------------------------------------------------------
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      packages: read

  # ---------------------------------------------------------------------------
  # Job 2: Build and push Docker images to GHCR
  # ---------------------------------------------------------------------------
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-24.04
    needs: ci
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      server-digest: ${{ steps.server.outputs.digest }}
      client-digest: ${{ steps.client.outputs.digest }}
      dashboard-digest: ${{ steps.dashboard.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          echo "version=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "full-tag=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build & push server image
        id: server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-server:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}-server:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.date }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build & push client image
        id: client
        uses: docker/build-push-action@v6
        with:
          context: .
          file: client/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-client:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}-client:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.date }}
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client

      - name: Build & push dashboard image
        id: dashboard
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dashboard/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-dashboard:${{ steps.meta.outputs.version }}
            ${{ env.IMAGE_PREFIX }}-dashboard:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.meta.outputs.date }}
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard

  # ---------------------------------------------------------------------------
  # Job 3: Deploy to Kubernetes
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to K8s
    runs-on: ubuntu-24.04
    needs: build-push
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'staging' }}
      url: ${{ github.event_name == 'workflow_dispatch' && inputs.environment == 'production' && 'https://agentburg.example.com' || 'https://staging.agentburg.example.com' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.32.0"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Set image tags with Kustomize
        working-directory: k8s
        run: |
          TAG="${{ needs.build-push.outputs.image-tag }}"

          # Install kustomize
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/latest/download/kustomize_v5.6.0_linux_amd64.tar.gz" | tar xz
          chmod +x kustomize

          # Set image tags via kustomize edit
          ./kustomize edit set image \
            "ghcr.io/twpark-ops/agentburg-server=ghcr.io/${{ github.repository_owner }}/agentburg-server:${TAG}" \
            "ghcr.io/twpark-ops/agentburg-dashboard=ghcr.io/${{ github.repository_owner }}/agentburg-dashboard:${TAG}"

      - name: Validate manifests
        working-directory: k8s
        run: |
          ./kustomize build . | kubectl apply --dry-run=client -f -

      - name: Apply manifests
        working-directory: k8s
        run: |
          ./kustomize build . | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl -n agentburg rollout status deployment/agentburg-server --timeout=300s
          kubectl -n agentburg rollout status deployment/dashboard --timeout=120s
          echo "Deployment successful!"

      - name: Verify health
        run: |
          # Wait for pods to be ready
          kubectl -n agentburg wait --for=condition=ready pod \
            -l app.kubernetes.io/name=agentburg-server \
            --timeout=120s

          # Check server pod count
          READY=$(kubectl -n agentburg get deployment agentburg-server -o jsonpath='{.status.readyReplicas}')
          echo "Server ready replicas: ${READY}"
          if [ "${READY}" -lt 1 ]; then
            echo "ERROR: No ready replicas!"
            kubectl -n agentburg describe deployment agentburg-server
            exit 1
          fi

      - name: Post deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Component | Image Tag |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Server | \`${{ needs.build-push.outputs.image-tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dashboard | \`${{ needs.build-push.outputs.image-tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit**: \`${GITHUB_SHA::7}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Triggered by**: ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
